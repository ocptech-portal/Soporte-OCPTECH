<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidos por la colaboración</title>
  <style>
    :root {
      --bg-start: #f6f8fb;
      --bg-end: #e8edf5;
      --card-bg: #ffffff;
      --text: #162033;
      --muted: #5b6678;
      --accent: #0b5cab;
      --accent-dark: #08457f;
      --danger: #c62828;
      --shadow: 0 24px 70px rgba(22, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      display: grid;
      place-items: center;
    }

    .page {
      width: min(92vw, 760px);
      padding: 32px;
    }

    .hero-card {
      min-height: 360px;
      padding: clamp(36px, 8vw, 84px) clamp(24px, 6vw, 72px);
      border-radius: 32px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      gap: 36px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.6rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
      max-width: 720px;
    }

    .call-support-btn {
      min-width: 220px;
      border: 0;
      border-radius: 999px;
      padding: 18px 34px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 16px 28px rgba(11, 92, 171, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, opacity 180ms ease;
    }

    .call-support-btn:hover:not(:disabled),
    .call-support-btn:focus-visible:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 20px 34px rgba(11, 92, 171, 0.26);
    }

    .call-support-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .status-panel {
      width: min(100%, 520px);
      padding: 18px;
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      background: #f8fafd;
      text-align: left;
    }

    .status-title {
      margin: 0 0 12px;
      font-weight: 800;
      color: var(--text);
    }

    .status-grid {
      display: grid;
      gap: 10px;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .status-value {
      font-weight: 800;
      color: var(--muted);
    }

    .status-item::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aab4c3;
      flex: 0 0 auto;
    }

    .status-item[data-state='working']::before {
      background: #b7791f;
    }

    .status-item[data-state='ok']::before {
      background: #1b7f4c;
    }

    .status-item[data-state='error']::before {
      background: var(--danger);
    }

    .status-message {
      margin-top: 14px;
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .incoming-call-notification {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: min(92vw, 420px);
      padding: 16px;
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(22, 32, 51, 0.22);
      transform: translateY(24px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .incoming-call-notification.show-notification {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .notifier-a {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 14px;
    }

    .call-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #ffffff;
      background: var(--accent);
    }

    .callee-name {
      font-weight: 700;
    }

    .call-time {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .cut-call-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      color: #ffffff;
      background: var(--danger);
      font-size: 1.3rem;
      line-height: 1;
    }

    .notifier-a-controls,
    .hide-controls,
    .sr-only,
    .dropbtn {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="page" id="body">
    <section class="hero-card" aria-label="Webex Click to Call">
      <div class="dropbtn" aria-hidden="true"><i id="availability"></i></div>
      <h1>Unidos por la colaboración</h1>
      <button id="clickToCallBtn" class="call-support-btn" type="button" onclick="initiateCall()" disabled>Click to Call</button>

      <div class="status-panel" aria-live="polite">
        <p class="status-title">Estado de Webex Calling</p>
        <div class="status-grid">
          <div class="status-item" id="configStatusItem" data-state="pending">
            <span>Configuración</span>
            <span class="status-value" id="configStatusValue">Pendiente</span>
          </div>
          <div class="status-item" id="authStatusItem" data-state="pending">
            <span>Autenticación</span>
            <span class="status-value" id="authStatusValue">Pendiente</span>
          </div>
          <div class="status-item" id="lineStatusItem" data-state="pending">
            <span>Línea</span>
            <span class="status-value" id="lineStatusValue">Pendiente</span>
          </div>
        </div>
        <div id="clickToCallStatus" class="status-message">Validando configuración...</div>
      </div>
    </section>
  </main>

  <div class="incoming-call-notification timestate" id="callNotification" aria-live="polite">
    <div class="notifier-a">
      <div class="call-avatar">W</div>
      <div class="call-info">
        <div class="callee-name">Webex Calling</div>
      </div>
      <div class="call-time" id="call-time">
        <span id="timer">00:00</span>
      </div>
      <div class="call-actions">
        <button class="cut-call-btn" type="button" aria-label="Finalizar llamada" onclick="disconnectCall()">×</button>
      </div>
    </div>
    <div class="notifier-a-controls hide-controls" id="notifier-a-controls"></div>
  </div>

  <audio id="local-audio" muted autoplay playsinline></audio>
  <audio id="customer-remote-audio" autoplay playsinline></audio>

  <script src="https://unpkg.com/webex/umd/webex.min.js"></script>
  <script src="https://unpkg.com/webex@3.5.0-next.25/umd/calling.min.js"></script>
  <script src="./js/app.js"></script>
  <script src="./sdk/calling-sdk.js"></script>
  <script>
    window.addEventListener('load', function () {
      if (typeof prepareClickToCall === 'function') {
        prepareClickToCall();
      }
    });
  </script>
</body>
</html>
